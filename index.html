<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar CRM</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Simple Modern Topbar -->
    <nav class="navbar" style="background: transparent; border: none; padding-top: 1.5rem;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0;">
            <div class="brand">
                <i data-lucide="zap" style="color: var(--text-main); width: 20px;"></i>
                Solar CRM
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">
                    <i data-lucide="moon" class="moon-icon"></i>
                    <i data-lucide="sun" class="sun-icon hidden"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 1rem;">
        <div style="margin-bottom: 2.5rem;">
            <h1>Get Your Estimate.</h1>
            <p class="text-muted" style="margin-top: 0.5rem;">Enter your property details below for an automated solar consultation.</p>
        </div>

        <div class="card card-padded">
            <form id="leadForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Jane Doe">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="jane@example.com">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="+1 (555) 000-0000">
                    </div>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" required placeholder="San Francisco">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="propertyType">Property Type</label>
                        <select id="propertyType" name="propertyType" required>
                            <option value="Residential">Residential</option>
                            <option value="Commercial">Commercial</option>
                            <option value="Industrial">Industrial</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="billAmount">Avg Monthly Bill</label>
                        <input type="number" id="billAmount" name="billAmount" required placeholder="250">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Submit Proposal <i data-lucide="arrow-right" style="width: 16px;"></i>
                </button>
            </form>

            <div id="successMessage" class="hidden success-msg">
                <i data-lucide="check-circle-2" style="width: 48px; height: 48px; color: var(--success); margin-bottom: 1rem;"></i>
                <h2>Request Logged</h2>
                <p class="text-muted" style="margin-top: 0.5rem;">Your lead has been pushed to the CRM webhook successfully.</p>
            </div>
        </div>
    </div>

    <!-- Script that handles logic -->
    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
